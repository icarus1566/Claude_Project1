version: '3.8'

services:
  api:
    build: 
      context: ../../
      dockerfile: Containerfile
    container_name: rag-api
    ports:
      - "8000:8000"
    env_file:
      - ../../.env
    volumes:
      - ../../models/embedding/bge-m3:/app/models/embedding/bge-m3:ro
      - ../../storage/hf_cache:/root/.cache/torch/sentence_transformers:rw
    depends_on:
      - qdrant
      - postgresql
      - minio

  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ../../storage/ollama_data:/root/.ollama
    # RHEL 머신 등 GPU 지원을 위해서는 배포 환경에 따라 device 지원 설정 추가 필요
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui
    ports:
      - "3000:8080"
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
    volumes:
      - ../../storage/openwebui_data:/app/backend/data
    depends_on:
      - ollama

  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    ports:
      - "6333:6333"
    volumes:
      - ../../storage/qdrant_data:/qdrant/storage

  minio:
    image: minio/minio:latest
    container_name: minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - ../../storage/minio_data:/data

  postgresql:
    image: postgres:15-alpine
    container_name: postgresql
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgrespassword
      - POSTGRES_DB=rag_db
    ports:
      - "5432:5432"
    volumes:
      - ../../storage/pg_data:/var/lib/postgresql/data
